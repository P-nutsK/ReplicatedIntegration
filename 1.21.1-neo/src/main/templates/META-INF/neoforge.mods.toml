modLoader="kotlinforforge"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="${mod_issue_tracker_url}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="${mod_display_url}"
logoFile="logo.png"
credits="${mod_credits}"
authors="${mod_authors}"
description='''${mod_description}'''

[[mixins]]
config="${mod_id}.mixins.json"

[[dependencies."${mod_id}"]]
modId="neoforge"
type="required"
versionRange="[${neo_version_range},)"
ordering="NONE"
side="BOTH"

[[dependencies."${mod_id}"]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies."${mod_id}"]]
modId="replication"
type="required"
versionRange="[1.21.1-1.2.6,)"
ordering="AFTER"
side="BOTH"

[[dependencies."${mod_id}"]]
modId="mekanism"
type="optional"
versionRange="[10.7.17,)"
ordering="NONE"
side="BOTH"

[[dependencies."${mod_id}"]]
modId="ae2"
type="optional"
versionRange="[19.2.16,)"
ordering="NONE"
side="BOTH"

[[dependencies."${mod_id}"]]
modId="advanced_ae"
type="optional"
versionRange="[1.6.11-1.21.1,)"
ordering="NONE"
side="BOTH"

[[dependencies."${mod_id}"]]
modId="draconicevolution"
type="optional"
versionRange="[3.1.4.621,)"
ordering="NONE"
side="BOTH"

