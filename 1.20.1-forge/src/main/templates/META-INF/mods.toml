modLoader="kotlinforforge"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="${mod_issue_tracker_url}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="${mod_display_url}"
logoFile="logo.png"
credits="${mod_credits}"
authors="${mod_authors}"
description='''${mod_description}'''

[[mixins]]
config="${mod_id}.mixins.json"

[[dependencies."${mod_id}"]]
modId="forge"
mandatory=true
versionRange="${forge_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies."${mod_id}"]]
modId="minecraft"
mandatory=true
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies."${mod_id}"]]
modId="replication"
mandatory=true
versionRange="[1.20.1-1.1.3,)"
ordering="AFTER"
side="BOTH"


[[dependencies."${mod_id}"]]
modId="mekanism"
mandatory=false
versionRange="[10.3,)"
ordering="NONE"
side="BOTH"

[[dependencies."${mod_id}"]]
modId="ae2"
mandatory=false
versionRange="[10.4.0,)"
ordering="NONE"
side="BOTH"

[[dependencies."${mod_id}"]]
modId="advanced_ae"
mandatory=false
versionRange="[1.2.7-1.20.1,)"
ordering="NONE"
side="BOTH"

[[dependencies."${mod_id}"]]
modId="draconicevolution"
mandatory=false
versionRange="[3.1.2.621,)"
ordering="NONE"
side="BOTH"

